<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Abhiyaan Sanitary and Plumber Service</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container" id="invoice">
      <!-- Header -->

      <div class="header">
        <img src="images/logo.png" alt="Logo" class="logo" />

        <div class="company-info">
          <h1>Abhiyaan Sanitary and Plumber Service</h1>

          <p>
            <strong>Address:</strong>
            Sanjay Nagar, Durga Nagar, 243005
          </p>

          <p>
            <strong>Mobile:</strong>
            9205448629
          </p>

          <p>
            <strong>WhatsApp:</strong>
            9205448629
          </p>
        </div>
      </div>

      <!-- Customer Details -->

      <div class="customer-section">
        <div>
          <label>Customer Name</label>

          <input type="text" placeholder="Enter customer name" />
        </div>

        <div>
          <label>Mobile Number</label>

          <input type="text" placeholder="Enter mobile number" />
        </div>

        <div>
          <label>Date</label>

          <input type="date" />
        </div>

        <div>
          <label>Estimate No.</label>

          <input type="text" placeholder="Estimate number" />
        </div>
      </div>

      <!-- Product Table -->

      <table>
        <thead>
          <tr>
            <th>Brand</th>

            <th>Product Name</th>

            <th>Size</th>

            <th>Rate</th>

            <th>Quantity</th>

            <th>Amount</th>

            <th>Action</th>
          </tr>
        </thead>

        <tbody id="tableBody">
          <tr>
            <td>
              <select>
                <option>Ashirvad</option>
                <option>Apollo</option>

                <option>Birla</option>

                <option>Astral</option>

                <option>Supreme</option>

                <option>Finolex</option>
              </select>
            </td>

            <td>
              <input type="text" placeholder="Product Name" />
            </td>

            <td>
              <input type="text" placeholder="Size" />
            </td>

            <td>
              <input type="number" class="rate" placeholder="Rate" />
            </td>

            <td>
              <input type="number" class="qty" placeholder="Qty" />
            </td>

            <td>
              <input type="number" class="amount" readonly />
            </td>

            <td>
              <button class="delete-btn" onclick="deleteRow(this)">X</button>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Buttons -->

      <div class="button-group">
        <button class="btn add-btn" onclick="addRow()">+ Add Product</button>

        <button class="btn pdf-btn" onclick="downloadPDF()">
          Save / Print PDF
        </button>
      </div>

      <!-- Calculation Section -->

      <div class="calculation-section">
        <div class="calc-box">
          <label>Total Amount</label>

          <input type="number" id="totalAmount" value="0" readonly />
        </div>

        <div class="calc-box">
          <label>Discount</label>

          <input type="number" id="discount" value="0" />
        </div>

        <div class="calc-box">
          <label>Fare Charge</label>

          <input type="number" id="fareCharge" value="0" />
        </div>
      </div>

      <!-- Grand Total -->

      <div class="total-box">
        Grand Total : ₹
        <span id="grandTotal"> 0 </span>
      </div>

      <!-- Footer -->

      <div class="footer">
        Thank You For Visiting Abhiyaan Sanitary and Plumber Service
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
